services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzas-pro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finanzas_pro
      POSTGRES_PASSWORD: finanzas_pro_dev_2026
      POSTGRES_DB: finanzas_pro
    ports:
      - "5436:5432"
    volumes:
      - finanzas_pro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzas_pro -d finanzas_pro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finanzas_pro_pgdata:
